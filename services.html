<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services - Revered Fitness</title>

  <meta name="description" content="Premium coaching and transformation services from Revered Fitness.">
  <link rel="icon" type="image/png" href="logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0a;
      --text:#f4efe8;
      --muted:#c9c1b5;
      --line:rgba(255,255,255,0.08);
      --line-strong:rgba(214,185,140,0.16);
      --accent:#d6b98c;
      --primary:#b11510;
      --primary-hover:#d32017;
      --success:#79d990;
      --shadow:0 20px 50px rgba(0,0,0,0.24);
      --radius:28px;
      --container:1240px;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:'Manrope', sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top center, rgba(177,21,16,0.10), transparent 24%),
        linear-gradient(180deg, #0a0a0a 0%, #060606 100%);
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    input,
    select,
    textarea{
      font:inherit;
    }

    .container{
      width:min(var(--container), calc(100% - 32px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(10,10,10,0.88);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .topbar-inner{
      min-height:64px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:24px;
      padding:10px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .nav-logo{
      width:38px;
      height:38px;
      object-fit:contain;
      filter:drop-shadow(0 0 10px rgba(214,185,140,0.18));
    }

    .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1;
    }

    .brand-text strong{
      font-size:0.84rem;
      font-weight:800;
      letter-spacing:1.5px;
    }

    .brand-text span{
      margin-top:4px;
      font-size:0.62rem;
      color:#c9c1b5;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .nav-links{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .nav-links a{
      padding:8px 12px;
      border-radius:999px;
      font-size:0.82rem;
      font-weight:700;
      color:#d7cec2;
      border:1px solid transparent;
      transition:0.25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active{
      background:rgba(255,255,255,0.03);
      border-color:rgba(255,255,255,0.08);
      color:#fff;
    }

    .nav-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:150px;
      padding:11px 16px;
      border-radius:999px;
      background:#f3ede5;
      color:#111;
      font-size:0.82rem;
      font-weight:800;
      transition:0.25s ease;
    }

    .nav-cta:hover{
      transform:translateY(-1px);
      opacity:0.94;
    }

    .menu-toggle{
      display:none;
      width:46px;
      height:46px;
      margin-left:auto;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:5px;
      cursor:pointer;
    }

    .menu-toggle span{
      width:18px;
      height:2px;
      border-radius:999px;
      background:#fff;
      transition:0.25s ease;
    }

    .mobile-nav{
      display:none;
      padding:0 0 14px;
    }

    .mobile-nav-links{
      display:grid;
      gap:10px;
      padding-top:8px;
    }

    .mobile-nav-links a{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      border-radius:16px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      color:#f4efe8;
      font-size:0.92rem;
      font-weight:700;
    }

    .mobile-nav-links a.active{
      border-color:rgba(214,185,140,0.18);
      color:#fff;
    }

    .mobile-nav-cta{
      background:linear-gradient(135deg, #b11510, #d32017) !important;
      border-color:transparent !important;
      color:#fff !important;
    }

    .page-hero{
      padding:46px 0 34px;
    }

    .page-hero-wrap{
      display:grid;
      grid-template-columns:minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap:48px;
      align-items:center;
    }

    .page-copy{
      max-width:540px;
    }

    .page-logo{
      width:min(170px, 38vw);
      margin:0 0 24px;
      object-fit:contain;
      mix-blend-mode:screen;
      filter:drop-shadow(0 0 16px rgba(0,0,0,0.22));
    }

    .eyebrow{
      display:inline-block;
      margin-bottom:18px;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--line-strong);
      color:var(--accent);
      font-size:0.74rem;
      font-weight:800;
      letter-spacing:1.8px;
      text-transform:uppercase;
      background:rgba(255,255,255,0.02);
    }

    h1{
      margin:0 0 18px;
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(3rem, 6vw, 5.5rem);
      line-height:0.9;
      font-weight:700;
    }

    .hero-text{
      margin:0;
      color:#d7cec3;
      font-size:1rem;
      line-height:1.95;
      max-width:560px;
    }

    .hero-panel{
      position:relative;
      min-height:460px;
      padding:34px;
      border-radius:36px;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(177,21,16,0.10), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01)),
        #101010;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hero-panel::before{
      content:"";
      position:absolute;
      inset:18px;
      border:1px solid rgba(214,185,140,0.08);
      border-radius:26px;
      pointer-events:none;
    }

    .hero-panel-content{
      position:relative;
      z-index:1;
      max-width:420px;
    }

    .hero-panel-content strong{
      display:block;
      margin-bottom:10px;
      font-size:0.8rem;
      letter-spacing:1.8px;
      text-transform:uppercase;
      color:var(--accent);
    }

    .hero-panel-content h2{
      margin:0 0 14px;
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(2.2rem, 4vw, 3.4rem);
      line-height:0.95;
      font-weight:700;
    }

    .hero-panel-content p{
      margin:0;
      color:#d7cec3;
      line-height:1.85;
      font-size:0.98rem;
    }

    .services-section{
      padding:20px 0 92px;
    }

    .services-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:20px;
    }

    .service-card{
      display:flex;
      flex-direction:column;
      padding:30px 28px;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01));
      box-shadow:var(--shadow);
    }

    .service-card.featured{
      border-color:rgba(214,185,140,0.24);
      background:
        radial-gradient(circle at top right, rgba(177,21,16,0.10), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.012));
    }

    .service-label{
      display:inline-block;
      margin-bottom:14px;
      color:var(--accent);
      font-size:0.74rem;
      font-weight:800;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .service-card h2{
      margin:0 0 14px;
      font-family:'Cormorant Garamond', serif;
      font-size:2rem;
      line-height:0.96;
      font-weight:700;
    }

    .service-card p{
      margin:0 0 18px;
      color:#d0c6ba;
      line-height:1.85;
      font-size:0.95rem;
    }

    .service-list{
      margin:0 0 22px;
      padding:0;
      list-style:none;
      display:grid;
      gap:10px;
    }

    .service-list li{
      color:#ddd4c8;
      font-size:0.93rem;
      line-height:1.7;
      padding-left:18px;
      position:relative;
    }

    .service-list li::before{
      content:"";
      position:absolute;
      left:0;
      top:10px;
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--accent);
    }

    .price{
      margin-top:auto;
      margin-bottom:18px;
      color:var(--accent);
      font-size:1.55rem;
      font-weight:800;
    }

    .best-value{
      display:inline-block;
      margin-top:8px;
      color:var(--success);
      font-size:0.82rem;
      font-weight:800;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:15px 18px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg, var(--primary), var(--primary-hover));
      color:white;
      font-size:0.92rem;
      font-weight:800;
      cursor:pointer;
      transition:0.25s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:0.96;
    }

    footer{
      padding:24px 16px 36px;
      color:#bfb5a7;
      text-align:center;
      border-top:1px solid rgba(255,255,255,0.06);
      font-size:0.92rem;
    }

    @media (max-width:1120px){
      .page-hero-wrap{
        grid-template-columns:1fr;
      }

      .services-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width:900px){
      .topbar-inner{
        grid-template-columns:auto auto;
      }

      .desktop-nav,
      .desktop-cta{
        display:none;
      }

      .menu-toggle{
        display:flex;
      }

      .mobile-nav.open{
        display:block;
      }

      .page-copy{
        text-align:center;
        max-width:none;
      }

      .page-logo{
        margin:0 auto 24px;
      }

      .eyebrow{
        margin-left:auto;
        margin-right:auto;
      }
    }

    @media (max-width:700px){
      .services-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .container{
        width:min(var(--container), calc(100% - 20px));
      }

      h1{
        font-size:clamp(2.7rem, 13vw, 4.5rem);
      }

      .hero-panel{
        min-height:300px;
        padding:18px;
        border-radius:24px;
      }

      .service-card{
        padding:24px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="container">
      <div class="topbar-inner">

        <a href="index.html" class="brand">
          <img src="logo.png" alt="Revered Fitness Logo" class="nav-logo">
          <div class="brand-text">
            <strong>REVERED FITNESS</strong>
            <span>Strength • Discipline • Respect</span>
          </div>
        </a>

        <button class="menu-toggle" id="menuToggle">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="nav-links desktop-nav">
          <a href="index.html">Home</a>
          <a href="services.html" class="active">Services</a>
          <a href="transformation.html">Transformation</a>
          <a href="events.html">Events</a>
          <a href="clothing.html">Clothing</a>
          <a href="about.html">About</a>
        </nav>

        <a href="about.html#contact" class="nav-cta desktop-cta">
          Book Consultation
        </a>

      </div>

      <div class="mobile-nav" id="mobileNav">
        <nav class="mobile-nav-links">
          <a href="index.html">Home</a>
          <a href="services.html" class="active">Services</a>
          <a href="transformation.html">Transformation</a>
          <a href="events.html">Events</a>
          <a href="clothing.html">Clothing</a>
          <a href="about.html">About</a>
          <a href="about.html#contact" class="mobile-nav-cta">
            Book Consultation
          </a>
        </nav>
      </div>

    </div>
  </div>

</body>
</html>
