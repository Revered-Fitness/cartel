<!DOCTYPE html>
<html>
<head>
  <title>Clothing - Revered Fitness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    nav {
      background:black;
      padding:18px 10px;
    }

    nav a{
      color:#f5f5f5;
      margin:0 18px;
      text-decoration:none;
      font-weight:600;
      letter-spacing:1px;
      padding:6px 14px;
      position:relative;
      transition:all 0.3s ease;
      display:inline-block;
    }

    nav a::after{
      content:"";
      position:absolute;
      right:-10px;
      top:50%;
      transform:translateY(-50%);
      height:18px;
      width:1px;
      background:rgba(255,255,255,0.25);
    }

    nav a:last-child::after{
      display:none;
    }

    nav a:hover{
      color:#ffffff;
      text-shadow:0 0 6px rgba(225,6,0,0.6);
    }

    nav a::before{
      content:"";
      position:absolute;
      bottom:-6px;
      left:50%;
      transform:translateX(-50%);
      width:0%;
      height:2px;
      background:#e10600;
      transition:width 0.3s ease;
      border-radius:2px;
    }

    nav a:hover::before{
      width:60%;
    }

    section {
      padding:60px 20px;
      max-width:1000px;
      margin:auto;
    }

    .products-container {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    .product-img {
      width:100%;
      max-width:300px;
      height:300px;
      object-fit:cover;
      border-radius:15px;
      box-shadow:0 0 25px rgba(225,6,0,0.4);
      transition: transform 0.3s ease;
      cursor: pointer;
      display:block;
    }

    /* hover effect for desktop */
    .product-img:hover {
      transform: scale(1.05);
    }

    /* MOBILE: 2 COLUMN NAV & responsive images */
    @media (max-width:600px){

      nav{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      nav a{
        display:block;
        margin:0;
        padding:12px 0;
        border-bottom:1px solid rgba(255,255,255,0.15);
      }

      nav a::after{
        display:none;
      }

      nav a:nth-last-child(-n+2){
        border-bottom:none;
      }

      .product-img {
        max-width:45%;
        height:200px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(225,6,0,0.4);
      }

      /* optional tap feedback */
      .product-img:active {
        transform: scale(0.97);
      }
    }

    footer {
      background: #000;
      color: #f5f5f5;
      padding: 20px;
      font-size: 14px;
      margin-top: 40px;
    }

  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<section>
  <h1>Revered Fitness Apparel</h1>
  <p>Premium Performance Wear.</p>

  <div class="products-container">
    <a href="shirt.jpg" target="_blank">
      <img src="shirt.jpg" alt="Revered Fitness Shirt" class="product-img">
    </a>
    <a href="hoodie.jpg" target="_blank">
      <img src="hoodie.jpg" alt="Revered Fitness Hoodie" class="product-img">
    </a>
  </div>
  
  <p>High quality training apparel designed for strength and style.</p>
</section>

<footer>
  © 2026 Revered Fitness
</footer>

</body>
</html>
