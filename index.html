<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revered Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLING --- */
body {
  margin:0;
  padding-top:80px; /* space for fixed nav */
  font-family: Arial, sans-serif; /* match About page */
  background:#0f0f0f;
  color:#fff;
  line-height:1.6;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

a { text-decoration:none; }

/* --- NAVIGATION --- */
nav {
  background:black;
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:center;
  padding:18px 10px;
}

nav a {
  color:#f5f5f5;
  margin:0 18px;
  text-decoration:none;
  font-weight:600;      
  font-family: Arial, sans-serif; 
  letter-spacing:1px;   
  padding:6px 14px;
  position:relative;
  transition:all 0.3s ease;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* vertical divider */
nav a::after {
  content:"";
  position:absolute;
  right:-10px;
  top:50%;
  transform:translateY(-50%);
  height:18px;
  width:1px;
  background:rgba(255,255,255,0.25);
}
nav a:last-child::after {
  display:none;
}

/* underline animation */
nav a::before {
  content:"";
  position:absolute;
  bottom:-6px;
  left:50%;
  transform:translateX(-50%);
  width:0%;
  height:2px;
  background:#e10600;
  transition:width 0.3s;
  border-radius:2px;
}

nav a:hover {
  color:#ffffff;
  text-shadow:0 0 6px rgba(225,6,0,0.6);
}

nav a:hover::before {
  width:60%;
}

/* --- HERO --- */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  flex:1;
}

.hero-container {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  max-width:1200px;
  width:100%;
  padding:0 20px;
  text-align:center;
}

.hero-img {
  width:40%;
  max-width:300px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.hero-text {
  flex:1;
  min-width:250px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo {
  width:220px;
  margin-bottom:20px;
}

.hero-text h1 {
  font-family:'Poppins', sans-serif;
  font-size:2.5rem;
  margin:0 0 15px 0;
}

.hero-text p {
  font-size:1.2rem;
  color:#d1d1d1;
  margin-bottom:20px;
}

/* BUTTON */
.btn {
  background:#e10600;
  padding:14px 30px;
  border-radius:8px;
  font-weight:700;
  color:#fff;
  display:inline-block;
  transition:0.3s;
}

.btn:hover {
  background:#ff2a2a;
}

/* FOOTER */
footer {
  background:#000;
  padding:20px;
  text-align:center;
  margin-top:auto;
}

/* --- MOBILE --- */
@media(max-width:500px){

  body {
    padding-top:100px; /* space for nav */
  }

  .hero-container {
    gap:10px;
    flex-direction:column;
    align-items:center;
  }

  /* Hide hero image on mobile */
  .hero-img {
    display:none;
  }

  /* Add spacing to hero-text */
  .hero-text {
    margin-top:20px;
  }

  .logo {
    width:140px;
    margin-bottom:10px;
  }

  .hero-text h1 {
    font-size:1.6rem;
    margin-bottom:5px;
  }

  .hero-text p {
    font-size:0.95rem;
    margin-bottom:10px;
  }

  /* Mobile nav: 2-column About style */
  nav {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    justify-items:center;
  }

  nav a {
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    margin:0;
    padding:12px 0;
    font-family: Arial, sans-serif !important;
    font-weight:600 !important;
    letter-spacing:1px !important;
    border-bottom:1px solid rgba(255,255,255,0.15);
  }

  nav a::after {
    display:none;
  }

  nav a:nth-last-child(-n+2){
    border-bottom:none;
  }
}
</style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="transformation.html">Transformation</a>
  <a href="events.html">Events</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<!-- HERO -->
<header>
  <div class="hero-container">
    <img src="hero.jpg" class="hero-img" alt="Hero Image">
    <div class="hero-text">
      <img src="logo.png" class="logo" alt="Revered Fitness Logo">
      <h1>REVERED FITNESS</h1>
      <p>Strength • Discipline • Respect</p>
      <a href="services.html" class="btn">Start Your Journey</a>
    </div>
  </div>
</header>

<!-- FOOTER -->
<footer>
  © 2026 Revered Fitness
</footer>

</body>
</html>
