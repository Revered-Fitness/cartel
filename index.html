<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revered Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLING --- */
body {
  margin:0;
  font-family: 'Roboto', Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
  line-height:1.6;
  overflow-x:hidden;
}

a { text-decoration:none; }

/* --- NAVIGATION FIXED TOP --- */
nav {
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:center;
  padding:12px 0;
}

nav a {
  color:#f5f5f5;
  margin:0 25px;
  font-weight:700;
  letter-spacing:1.5px;
  padding:6px 12px;
  position:relative;
  transition:all 0.3s ease;
  font-family:'Poppins', sans-serif;
}

nav a::before {
  content:"";
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:0%;
  height:2px;
  background:#e10600;
  transition:width 0.3s ease;
  border-radius:2px;
}

nav a:hover { color:#e10600; }
nav a:hover::before { width:60%; }

/* --- HERO SECTION --- */
header {
  position:relative;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  padding-top:20px;
}

.hero-container {
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  width:100%;
  padding:0 20px;
  gap:40px;
}

.hero-container img.hero-img {
  width:60%;
  max-width:600px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
  object-fit:cover;
}

.hero-text {
  width:35%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.hero-text img.logo {
  width:75%;
  margin-bottom:20px;
}

.hero-text h1 {
  font-family:'Poppins', sans-serif;
  font-size:2.3rem;
  letter-spacing:2px;
  margin:0;
}

.hero-text p {
  font-size:1.2rem;
  color:#d1d1d1;
}

.btn {
  display:inline-block;
  background:#e10600;
  color:#fff;
  padding:14px 30px;
  border-radius:8px;
  font-weight:700;
  text-transform:uppercase;
  box-shadow:0 5px 15px rgba(225,6,0,0.4);
  transition:0.3s;
}

.btn:hover {
  background:#a00000;
  transform:translateY(-3px);
}

/* --- TRANSFORMATION SECTION --- */
#transformation {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:80px 20px;
  gap:50px;
}

#transformation img {
  width:45%;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(225,6,0,0.6);
}

.transformation-text {
  flex:1;
  min-width:300px;
}

.transformation-text h2 {
  color:#e10600;
}

.transformation-paragraph {
  color:#ccc;
}

/* CONTACT */
#contact {
  text-align:center;
  padding:40px 20px;
}

.contact-box {
  background:#1a1a1a;
  padding:30px;
  border-radius:12px;
}

/* FOOTER */
footer {
  background:#000;
  padding:20px;
  text-align:center;
}

/* --- RESPONSIVE --- */
@media(max-width:992px){
  .hero-container {
    flex-direction:column;
    text-align:center;
  }
  .hero-text { width:100%; }
  .hero-container img.hero-img { width:80%; }
}

/* 🔥 MOBILE NAV FIX */
@media(max-width:500px){
  .hero-text h1 { font-size:1.8rem; }
  .hero-text p { font-size:1rem; }

  nav {
    flex-wrap: wrap;
    justify-content: center;
  }

  nav a {
    margin: 8px 12px;
    font-size: 0.9rem;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<!-- HERO -->
<header>
  <div class="hero-container">
    <img src="moving.jpg" class="hero-img">
    <div class="hero-text">
      <img src="logo.png" class="logo">
      <h1>REVERED FITNESS</h1>
      <p>Strength • Discipline • Respect</p>
      <a href="#contact" class="btn">Start Your Journey</a>
    </div>
  </div>
</header>

<!-- TRANSFORMATION -->
<section id="transformation">
  <img src="new-transform.jpg">
  <div class="transformation-text">
    <h2>My Transformation</h2>
    <p>56kg → 70kg transformation through discipline and consistency.</p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <div class="contact-box">
    <p>Email: j.p.blackburn@hotmail.co.uk</p>
    <a class="btn" href="https://instagram.com/Revered_fitness_pt">Instagram</a>
  </div>
</section>

<footer>
  © 2026 Revered Fitness
</footer>

</body>
</html>
