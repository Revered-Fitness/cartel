<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revered Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLING --- */
body {
  margin:0;
  font-family: 'Roboto', Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
  line-height:1.6;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

a { text-decoration:none; }

/* --- NAVIGATION --- */
nav {
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:center;
  padding:12px 0;
}

nav a {
  color:#f5f5f5;
  margin:0 25px;
  font-weight:700;
  letter-spacing:1.5px;
  padding:6px 12px;
  position:relative;
  transition:0.3s;
  font-family:'Poppins', sans-serif;
}

nav a::before {
  content:"";
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:0%;
  height:2px;
  background:#e10600;
  transition:0.3s;
}

nav a:hover { color:#e10600; }
nav a:hover::before { width:60%; }

/* --- HERO --- */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:100px; /* leave space for fixed nav */
  flex:1; /* push footer to bottom if needed */
}

.hero-container {
  display:flex;
  justify-content:space-between;
  max-width:1200px;
  width:100%;
  padding:0 20px;
  gap:40px;
}

.hero-img {
  width:60%;
  max-width:600px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.hero-text {
  width:35%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.logo {
  width:75%;
  margin-bottom:20px;
}

.hero-text h1 {
  font-family:'Poppins';
  font-size:2.3rem;
}

.hero-text p {
  color:#d1d1d1;
}

/* BUTTON */
.btn {
  background:#e10600;
  padding:14px 30px;
  border-radius:8px;
  font-weight:700;
  color:#fff;
  display:inline-block;
  margin-top:10px;
}

/* FOOTER */
footer {
  background:#000;
  padding:20px;
  text-align:center;
  margin-top:auto; /* push footer right below hero if page is short */
}

/* --- MOBILE / TABLET RESPONSIVE --- */
@media(max-width:992px){
  .hero-container {
    flex-direction:column;
    text-align:center;
  }
  .hero-text {
    width:100%;
    align-items:center;
  }
  .hero-img {
    width:80%;
  }
}

@media(max-width:500px){
  header {
    margin-top:70px;
  }
  .hero-container {
    flex-direction: column-reverse;
    align-items: center;
    text-align: center;
  }
  .hero-text {
    width: 100%;
    align-items: center;
  }
  .logo {
    width: 80%;
    max-width: 220px;
    margin-top: 10px;
  }
  .hero-img {
    width: 100%;
    max-width: 320px;
  }
  .hero-text h1 {
    font-size:1.8rem;
  }
  .hero-text p {
    font-size:1rem;
  }
}
</style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="transformation.html">Transformation</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<!-- HERO SECTION -->
<header>
  <div class="hero-container">
    <img src="moving.jpg" class="hero-img" alt="Hero Image">
    <div class="hero-text">
      <img src="logo.png" class="logo" alt="Revered Fitness Logo">
      <h1>REVERED FITNESS</h1>
      <p>Strength • Discipline • Respect</p>
      <a href="services.html" class="btn">Start Your Journey</a>
    </div>
  </div>
</header>

<!-- FOOTER -->
<footer>
  © 2026 Revered Fitness
</footer>

</body>
</html>
