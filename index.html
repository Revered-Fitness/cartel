<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revered Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLING --- */
body {
  margin:0;
  font-family: 'Roboto', Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
  line-height:1.6;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

a { text-decoration:none; }

/* --- NAVIGATION (matching About/Events) --- */
nav {
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:center;
  padding:12px 0;
}

nav a {
  color:#f5f5f5;
  margin:0 25px;
  font-weight:700;
  letter-spacing:1.5px;
  padding:6px 12px;
  position:relative;
  transition:0.3s;
  font-family:'Poppins', sans-serif;
}

nav a::before {
  content:"";
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:0%;
  height:2px;
  background:#e10600;
  transition:0.3s;
}

nav a.active {
  color:#e10600;
}

nav a.active::before {
  width:60%;
}

nav a:hover {
  color:#e10600;
}

nav a:hover::before {
  width:60%;
}

/* --- HERO --- */
header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:80px; /* space from fixed nav */
  flex:1;
}

.hero-container {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px; /* reduced spacing between image and text */
  flex-wrap:wrap;
  max-width:1200px;
  width:100%;
  padding:0 20px;
  text-align:center;
}

.hero-img {
  width:40%;
  max-width:300px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

.hero-text {
  flex:1;
  min-width:250px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo {
  width:220px; /* larger logo */
  margin-bottom:20px;
}

.hero-text h1 {
  font-family:'Poppins', sans-serif;
  font-size:2.5rem;
  margin:0 0 15px 0;
}

.hero-text p {
  font-size:1.2rem;
  color:#d1d1d1;
  margin-bottom:20px;
}

/* BUTTON */
.btn {
  background:#e10600;
  padding:14px 30px;
  border-radius:8px;
  font-weight:700;
  color:#fff;
  display:inline-block;
  transition:0.3s;
}

.btn:hover {
  background:#ff2a2a;
}

/* FOOTER */
footer {
  background:#000;
  padding:20px;
  text-align:center;
  margin-top:auto;
}

/* --- MOBILE / TABLET --- */
@media(max-width:992px){
  header {
    padding-top:60px;
  }
  .hero-container {
    flex-direction:column;
    gap:10px;
    text-align:center;
  }
  .hero-img {
    width:60%;
    max-width:250px;
  }
  .logo {
    width:180px;
  }
  .hero-text h1 {
    font-size:2rem;
  }
  .hero-text p {
    font-size:1rem;
  }
}

@media(max-width:500px){
  header {
    padding-top:50px;
  }
  .hero-container {
    gap:8px;
  }
  .hero-img {
    width:80%;
    max-width:200px;
  }
  .logo {
    width:140px;
  }
  .hero-text h1 {
    font-size:1.6rem;
  }
  .hero-text p {
    font-size:0.95rem;
  }
}
</style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
  <a href="index.html" class="active">Home</a>
  <a href="services.html">Services</a>
  <a href="transformation.html">Transformation</a>
  <a href="events.html">Events</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<!-- HERO SECTION -->
<header>
  <div class="hero-container">
    <img src="hero.jpg" class="hero-img" alt="Hero Image">
    <div class="hero-text">
      <img src="logo.png" class="logo" alt="Revered Fitness Logo">
      <h1>REVERED FITNESS</h1>
      <p>Strength • Discipline • Respect</p>
      <a href="services.html" class="btn">Start Your Journey</a>
    </div>
  </div>
</header>

<!-- FOOTER -->
<footer>
  © 2026 Revered Fitness
</footer>

</body>
</html>
