<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revered Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- BASE STYLING --- */
body {
  margin:0;
  font-family: 'Roboto', Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
  line-height:1.6;
  overflow-x:hidden;
}

a { text-decoration:none; }

/* --- NAVIGATION FIXED TOP --- */
nav {
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:center;
  padding:12px 0;
}

nav a {
  color:#f5f5f5;
  margin:0 25px;
  font-weight:600;
  letter-spacing:1px;
  padding:6px 12px;
  position:relative;
  transition:all 0.3s ease;
  font-family:'Poppins', sans-serif;
}

nav a::before {
  content:"";
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:0%;
  height:2px;
  background:#e10600;
  transition:width 0.3s ease;
  border-radius:2px;
}

nav a:hover { color:#e10600; }
nav a:hover::before { width:60%; }

/* --- HERO SECTION --- */
header {
  position:relative;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  padding-top:20px;
  margin-top:0;
}

.hero-container {
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  width:100%;
  padding:0 20px;
  gap:40px;
}

/* HERO IMAGE */
.hero-container img.hero-img {
  width:60%;
  max-width:600px;
  height:auto;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
  object-fit:cover;
  display:block;
}

/* HERO TEXT ON RIGHT */
.hero-text {
  width:35%;
  display:flex;
  flex-direction:column;
  justify-content:center; /* vertically centered with image */
  align-items:flex-start;
  height:100%;
}

/* Logo aligned vertically in line with hero text */
.hero-text img.logo {
  width:75%;
  margin-bottom:20px;
  object-fit:contain;
}

/* Text group (heading, tagline, button) */
.hero-text .text-group {
  display:flex;
  flex-direction:column;
  justify-content:center; /* center all text vertically */
  gap:12px;
}

/* Heading */
.hero-text h1 {
  font-size:2.3rem; /* slightly larger */
  letter-spacing:2px;
  margin:0;
}

/* Tagline */
.hero-text p {
  font-size:1.2rem; /* slightly larger */
  color:#ddd;
  margin:0;
}

/* BUTTON */
.btn {
  display:inline-block;
  background:#e10600;
  color:#fff;
  padding:14px 30px; /* slightly bigger */
  border-radius:8px;
  font-weight:bold;
  text-transform:uppercase;
  letter-spacing:1px;
  box-shadow:0 5px 15px rgba(225,6,0,0.4);
  transition: all 0.3s ease;
  font-family:'Poppins', sans-serif;
}

.btn:hover {
  background:#a00000;
  box-shadow:0 8px 25px rgba(225,6,0,0.7);
  transform:translateY(-3px);
}

/* --- TRANSFORMATION SECTION --- */
#transformation {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
  max-width:1200px;
  margin:0 auto;
  gap:50px;
}

#transformation img {
  width:45%;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(225,6,0,0.6);
  cursor:pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

#transformation img:hover {
  transform: scale(1.05) rotateX(2deg) rotateY(-2deg);
  box-shadow:0 15px 40px rgba(225,6,0,0.7);
}

.transformation-text {
  flex:1;
  min-width:300px;
}

.transformation-text h2 {
  font-size:2rem;
  color:#e10600;
  margin-bottom:15px;
  font-family:'Poppins', sans-serif;
}

.transformation-text p {
  font-size:1rem;
  color:#ccc;
  line-height:1.5;
  font-family:'Roboto', sans-serif;
}

/* CONTACT SECTION */
#contact {
  flex-direction:column;
  text-align:center;
  padding:60px 20px;
}

.contact-box {
  background:rgba(26,26,26,0.9);
  padding:35px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(225,6,0,0.5);
  max-width:500px;
  margin:0 auto;
}

.contact-box p { margin:12px 0; }

/* FOOTER */
footer {
  background:#000;
  padding:20px;
  font-size:0.9rem;
  letter-spacing:0.5px;
  text-align:center;
  margin-top:40px;
}

/* --- RESPONSIVE --- */
@media(max-width:992px){
  .hero-container {
    flex-direction:column;
    text-align:center;
    align-items:center;
  }
  .hero-text { width:100%; align-items:center; justify-content:center; }
  .hero-text img.logo { margin-bottom:15px; width:75%; }
  .hero-text .text-group { height:auto; gap:8px; }
  .hero-container img.hero-img { width:80%; margin-bottom:20px; }
  #transformation { flex-direction:column; }
  #transformation img, .transformation-text { width:80%; }
}

@media(max-width:500px){
  .hero-text h1 { font-size:1.8rem; }
  .hero-text p { font-size:1rem; }
  .hero-text img.logo { width:100%; max-width:210px; }
  .hero-container img.hero-img { width:100%; max-width:none; }
}
</style>
</head>
<body>

<!-- NAVIGATION FIXED TOP -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<header>
  <div class="hero-container">
    <img src="moving.jpg" alt="Hero Image" class="hero-img">
    <div class="hero-text">
      <img src="logo.png" alt="Revered Fitness Logo" class="logo">
      <div class="text-group">
        <h1>REVERED FITNESS</h1>
        <p>Strength • Discipline • Respect</p>
        <a href="#contact" class="btn">Start Your Journey</a>
      </div>
    </div>
  </div>
</header>

<section id="transformation">
  <img src="transform.jpg" alt="Self Transformation Photo" class="section-img">
  <div class="transformation-text">
    <h2>My Transformation</h2>
    <p>A personal journey from dedication to results, showing the power of consistency and hard work.</p>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="contact-box">
    <p><strong>Email</strong><br>j.p.blackburn@hotmail.co.uk</p>
    <a class="btn" href="https://instagram.com/Revered_fitness_pt" target="_blank">Instagram</a>
  </div>
</section>

<footer>
  © 2026 Revered Fitness
</footer>

</body>
</html>
