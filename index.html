<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revered Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
/* --- BASE STYLING --- */
body {
  margin:0;
  font-family: 'Roboto', Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
  line-height:1.6;
  overflow-x:hidden;
}

a { text-decoration:none; }

/* --- NAVIGATION FIXED TOP --- */
nav {
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:center;
  padding:12px 0;
}

nav a {
  color:#f5f5f5;
  margin:0 25px;
  font-weight:600;
  letter-spacing:1px;
  padding:6px 12px;
  position:relative;
  transition:all 0.3s ease;
  font-family:'Poppins', sans-serif;
}

nav a::before {
  content:"";
  position:absolute;
  bottom:-4px;
  left:50%;
  transform:translateX(-50%);
  width:0%;
  height:2px;
  background:#e10600;
  transition:width 0.3s ease;
  border-radius:2px;
}

nav a:hover { color:#e10600; }
nav a:hover::before { width:60%; }

/* --- HERO SECTION --- */
header {
  position:relative;
  width:100%;
  min-height:60vh; /* SHRINKED HERO HEIGHT */
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  padding:80px 20px 20px 20px; /* top padding adjusted for fixed nav */
  z-index:1;
}

.hero-container {
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  width:100%;
  z-index:2;
}

#particle-canvas {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

.hero-container img.hero-img {
  width:45%;
  border-radius:15px;
  box-shadow:0 8px 25px rgba(225,6,0,0.6);
  object-fit:cover;
  z-index:1;
}

.hero-overlay {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  border-radius:15px;
  background:linear-gradient(120deg, rgba(225,6,0,0.25), rgba(255,255,255,0.05), rgba(225,6,0,0.25));
  mix-blend-mode:overlay;
  pointer-events:none;
  z-index:1;
  transition: transform 0.1s ease-out;
}

/* --- HERO TEXT --- */
.hero-text {
  width:50%;
  text-align:left;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  opacity:0;
  transform:translateX(100px);
  animation: slideFadeIn 1.2s forwards;
  animation-delay:0.3s;
}

@keyframes slideFadeIn {
  0% { opacity:0; transform:translateX(100px); }
  100% { opacity:1; transform:translateX(0); }
}

.hero-text img.logo {
  width:260px; /* INCREASED LOGO SIZE */
  margin-bottom:20px;
}

.hero-text h1 {
  font-size:3rem;
  letter-spacing:3px;
  margin-bottom:15px;
  font-family:'Poppins', sans-serif;
}

.hero-text p {
  color:#ddd;
  font-size:1.2rem;
  margin-bottom:25px;
  font-family:'Roboto', sans-serif;
}

/* --- BUTTON --- */
.btn {
  display:inline-block;
  background:#e10600;
  color:#fff;
  padding:12px 28px;
  border-radius:8px;
  font-weight:bold;
  text-transform:uppercase;
  letter-spacing:1px;
  box-shadow:0 5px 15px rgba(225,6,0,0.4);
  transition: all 0.3s ease;
  font-family:'Poppins', sans-serif;
  opacity:0;
  transform:translateY(20px);
}

.btn.show {
  animation: slideUpFadeIn 0.8s forwards, pulse-glow 2.5s infinite alternate 0.5s;
}

@keyframes slideUpFadeIn {
  0% { opacity:0; transform:translateY(20px); }
  100% { opacity:1; transform:translateY(0); }
}

.btn:hover {
  background:#a00000;
  box-shadow:0 8px 25px rgba(225,6,0,0.7);
  transform:translateY(-3px);
}

@keyframes pulse-glow {
  0% { box-shadow:0 5px 15px rgba(225,6,0,0.4); }
  50% { box-shadow:0 8px 25px rgba(225,6,0,0.6); }
  100% { box-shadow:0 5px 15px rgba(225,6,0,0.4); }
}

/* --- TRANSFORMATION SECTION --- */
#transformation {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
  max-width:1200px;
  margin:0 auto;
  gap:50px;
}

#transformation img {
  width:45%;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(225,6,0,0.6);
  cursor:pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

#transformation img:hover {
  transform: scale(1.05) rotateX(2deg) rotateY(-2deg);
  box-shadow:0 15px 40px rgba(225,6,0,0.7);
}

.transformation-text {
  flex:1;
  min-width:300px;
}

.transformation-text h2 {
  font-size:2rem;
  color:#e10600;
  margin-bottom:15px;
  font-family:'Poppins', sans-serif;
}

.transformation-text p {
  font-size:1rem;
  color:#ccc;
  line-height:1.5;
  font-family:'Roboto', sans-serif;
}

/* CONTACT SECTION */
#contact {
  flex-direction:column;
  text-align:center;
  padding:60px 20px;
}

.contact-box {
  background:rgba(26,26,26,0.9);
  padding:35px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(225,6,0,0.5);
  max-width:500px;
  margin:0 auto;
}

.contact-box p { margin:12px 0; }

/* FOOTER */
footer {
  background:#000;
  padding:20px;
  font-size:0.9rem;
  letter-spacing:0.5px;
  text-align:center;
  margin-top:40px;
}

/* --- RESPONSIVE --- */
@media(max-width:992px){
  .hero-container, #transformation {
    flex-direction:column;
    text-align:center;
  }
  .hero-text { width:100%; align-items:center; }
  .hero-text img.logo { margin-bottom:15px; }
  #transformation img, .transformation-text { width:80%; }
}

@media(max-width:500px){
  .hero-text h1 { font-size:2rem; }
  .hero-text p { font-size:1rem; }
  .hero-text img.logo { width:220px; }
}
</style>
</head>
<body>

<!-- NAVIGATION FIXED TOP -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="clothing.html">Clothing</a>
  <a href="about.html">About</a>
</nav>

<header>
  <canvas id="particle-canvas"></canvas>
  <div class="hero-container">
    <img src="moving.jpg" alt="Hero Image" class="hero-img" id="hero-image">
    <div class="hero-overlay" id="hero-overlay"></div>
    <div class="hero-text">
      <img src="logo.png" alt="Revered Fitness Logo" class="logo">
      <h1>REVERED FITNESS</h1>
      <p>Strength • Discipline • Respect</p>
      <a href="#contact" class="btn" id="hero-btn">Start Your Journey</a>
    </div>
  </div>
</header>

<section id="transformation">
  <img src="transform.jpg" alt="Self Transformation Photo" class="section-img">
  <div class="transformation-text">
    <h2>My Transformation</h2>
    <p>A personal journey from dedication to results, showing the power of consistency and hard work.</p>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="contact-box">
    <p><strong>Email</strong><br>j.p.blackburn@hotmail.co.uk</p>
    <a class="btn" href="https://instagram.com/Revered_fitness_pt" target="_blank">Instagram</a>
  </div>
</section>

<footer>
  © 2026 Revered Fitness
</footer>

<script>
// Animate hero button
window.addEventListener('load', () => {
  const btn = document.getElementById('hero-btn');
  setTimeout(() => btn.classList.add('show'), 1500);
});

// Parallax scroll
window.addEventListener('scroll', () => {
  const hero = document.getElementById('hero-image');
  hero.style.transform = `translateY(${window.scrollY * 0.2}px)`;
  const overlay = document.getElementById('hero-overlay');
  overlay.style.transform = `translateY(${window.scrollY * 0.1}px)`;
});

// Smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e){
    e.preventDefault();
    const target = document.querySelector(this.getAttribute('href'));
    if(target) target.scrollIntoView({ behavior:'smooth', block:'start' });
  });
});

// Section images appear
const images = document.querySelectorAll('.section-img');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.3 });
images.forEach(img => observer.observe(img));

// Particle animation
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particlesArray = [];

class Particle {
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*3 + 1;
    this.speedX = Math.random()*1 - 0.5;
    this.speedY = Math.random()*1 - 0.5;
    this.color = 'rgba(225,6,0,0.3)';
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x > canvas.width || this.x < 0) this.speedX *= -1;
    if(this.y > canvas.height || this.y < 0) this.speedY *= -1;
  }
  draw(){
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i=0;i<80;i++) particlesArray.push(new Particle());
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});
</script>
</body>
</html>
